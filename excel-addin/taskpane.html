<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Excel AI Assistant</title>
    <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Syne:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f0f11;
            --surface: #16161a;
            --surface2: #1e1e24;
            --border: #2a2a32;
            --accent: #4f8ef7;
            --accent-dim: #1e3060;
            --green: #3ecf8e;
            --red: #f87171;
            --yellow: #fbbf24;
            --text: #e8e8f0;
            --text-dim: #6b6b7e;
            --user-bg: #1a3a6e;
            --user-border: #4f8ef7;
            --ai-bg: #1e1e24;
            --ai-border: #2a2a32;
            --radius: 12px;
            --radius-sm: 8px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: 'Syne', sans-serif;
            overflow: hidden;
        }

        /* ── Layout ── */
        .app {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* ── Header ── */
        .header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 14px 16px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .header-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #1e6ef7, #4f8ef7);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }

        .header-text {
            flex: 1;
        }

        .header-title {
            font-size: 13px;
            font-weight: 700;
            color: var(--text);
            letter-spacing: 0.02em;
        }

        .header-sub {
            font-size: 10px;
            color: var(--text-dim);
            font-family: 'IBM Plex Mono', monospace;
            margin-top: 1px;
        }

        .status-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--green);
            flex-shrink: 0;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* ── Quick Actions Bar ── */
        .quick-bar {
            display: flex;
            gap: 6px;
            padding: 8px 12px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            overflow-x: auto;
            flex-shrink: 0;
            scrollbar-width: none;
        }

        .quick-bar::-webkit-scrollbar { display: none; }

        .quick-btn {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 4px 10px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 20px;
            color: var(--text-dim);
            font-size: 10px;
            font-family: 'IBM Plex Mono', monospace;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.15s ease;
            flex-shrink: 0;
        }

        .quick-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--accent-dim);
        }

        /* ── Chat Container ── */
        #chatContainer {
            flex: 1;
            overflow-y: auto;
            padding: 16px 12px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            scroll-behavior: smooth;
        }

        #chatContainer::-webkit-scrollbar {
            width: 4px;
        }

        #chatContainer::-webkit-scrollbar-track {
            background: transparent;
        }

        #chatContainer::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        /* ── Message Wrappers ── */
        .msg-wrap {
            display: flex;
            margin-bottom: 2px;
        }

        .user-wrap {
            justify-content: flex-end;
        }

        .ai-wrap {
            justify-content: flex-start;
        }

        /* ── Bubbles ── */
        .bubble {
            max-width: 85%;
            padding: 10px 14px;
            font-size: 13px;
            line-height: 1.5;
            word-break: break-word;
            border-radius: var(--radius);
        }

        .user-bubble {
            background: var(--user-bg);
            border: 1px solid var(--user-border);
            border-bottom-right-radius: 4px;
            color: #c8d8ff;
        }

        .ai-bubble {
            background: var(--ai-bg);
            border: 1px solid var(--ai-border);
            border-bottom-left-radius: 4px;
            color: var(--text);
        }

        .error-bubble {
            background: #2a1515;
            border-color: var(--red);
            color: #fca5a5;
        }

        /* ── Feedback Lines ── */
        .feedback {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 11px;
            padding: 3px 12px 3px 20px;
            border-left: 2px solid transparent;
            margin: 2px 0;
            line-height: 1.4;
        }

        .feedback-ok {
            color: var(--green);
            border-color: var(--green);
        }

        .feedback-error {
            color: var(--red);
            border-color: var(--red);
        }

        /* ── Loading Dots ── */
        .loading-dots {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 12px 16px;
            background: var(--ai-bg);
            border: 1px solid var(--ai-border);
            border-bottom-left-radius: 4px;
            border-radius: var(--radius);
        }

        .loading-dots span {
            width: 6px;
            height: 6px;
            background: var(--accent);
            border-radius: 50%;
            animation: dotBounce 1.2s ease-in-out infinite;
        }

        .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
        .loading-dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes dotBounce {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-5px); opacity: 1; }
        }

        /* ── Date Divider ── */
        .date-divider {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 8px 0;
            color: var(--text-dim);
            font-size: 10px;
            font-family: 'IBM Plex Mono', monospace;
        }

        .date-divider::before,
        .date-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        /* ── Input Area ── */
        .input-area {
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 12px;
            background: var(--surface);
            border-top: 1px solid var(--border);
            flex-shrink: 0;
        }

        .input-row {
            display: flex;
            gap: 8px;
            align-items: flex-end;
        }

        .input-wrap {
            flex: 1;
            position: relative;
        }

        #userInput {
            width: 100%;
            padding: 10px 14px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text);
            font-size: 13px;
            font-family: 'Syne', sans-serif;
            outline: none;
            resize: none;
            min-height: 40px;
            max-height: 100px;
            line-height: 1.4;
            transition: border-color 0.15s ease;
        }

        #userInput:focus {
            border-color: var(--accent);
        }

        #userInput::placeholder {
            color: var(--text-dim);
            font-size: 12px;
        }

        #sendBtn {
            width: 40px;
            height: 40px;
            background: var(--accent);
            border: none;
            border-radius: var(--radius-sm);
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: background 0.15s ease;
            font-size: 16px;
        }

        #sendBtn:hover { background: #3a7de8; }
        #sendBtn:disabled { background: var(--border); cursor: not-allowed; }

        .input-hint {
            font-size: 10px;
            color: var(--text-dim);
            font-family: 'IBM Plex Mono', monospace;
            text-align: center;
        }

        /* ── Empty State ── */
        .empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 20px;
            text-align: center;
            color: var(--text-dim);
        }

        .empty-icon {
            font-size: 32px;
            margin-bottom: 4px;
        }

        .empty-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text);
        }

        .empty-desc {
            font-size: 11px;
            line-height: 1.5;
            max-width: 200px;
        }

        .example-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            justify-content: center;
            margin-top: 8px;
        }

        .chip {
            padding: 4px 10px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 20px;
            font-size: 10px;
            color: var(--text-dim);
            cursor: pointer;
            font-family: 'IBM Plex Mono', monospace;
            transition: all 0.15s;
        }

        .chip:hover {
            border-color: var(--accent);
            color: var(--accent);
        }
    </style>
</head>
<body>
    <div class="app">

        <!-- Header -->
        <div class="header">
            <div class="header-icon">📊</div>
            <div class="header-text">
                <div class="header-title">Excel AI Assistant</div>
                <div class="header-sub">Universal · Any Industry</div>
            </div>
            <div class="status-dot" title="Connected"></div>
        </div>

        <!-- Quick Action Buttons -->
        <div class="quick-bar">
            <button class="quick-btn" onclick="quickPrompt('Add a new row')">+ Add Row</button>
            <button class="quick-btn" onclick="quickPrompt('Bold the header row A1')">Bold Headers</button>
            <button class="quick-btn" onclick="quickPrompt('Sort by date descending')">↕ Sort</button>
            <button class="quick-btn" onclick="quickPrompt('Insert SUM formula')">Σ Formula</button>
            <button class="quick-btn" onclick="quickPrompt('Clean and trim the Name column')">🧹 Clean</button>
            <button class="quick-btn" onclick="quickPrompt('Create a new sheet called Summary')">+ Sheet</button>
        </div>

        <!-- Chat Area -->
        <div id="chatContainer">
            <div class="date-divider" id="todayDivider">Today</div>
        </div>

        <!-- Input -->
        <div class="input-area">
            <div class="input-row">
                <div class="input-wrap">
                    <input
                        type="text"
                        id="userInput"
                        placeholder="Add row, edit data, insert formula, format cells..."
                        autocomplete="off"
                        spellcheck="false"
                    />
                </div>
                <button id="sendBtn" title="Send (Enter)">↑</button>
            </div>
            <div class="input-hint">Enter to send · Works with any spreadsheet</div>
        </div>

    </div>

    <script src="taskpane.js"></script>
    <script>
        // Quick prompt helper
        function quickPrompt(text) {
            const input = document.getElementById("userInput");
            if (input) {
                input.value = text;
                input.focus();
            }
        }

        // Auto-resize input (optional UX enhancement)
        const input = document.getElementById("userInput");
        if (input) {
            input.addEventListener("input", function() {
                this.style.height = "auto";
                this.style.height = Math.min(this.scrollHeight, 100) + "px";
            });
        }
    </script>
</body>
</html>
